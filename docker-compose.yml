services:
  paytm-importer:
    build: .
    container_name: paytm-importer
    restart: unless-stopped
    environment:
      - ACTUAL_SERVER_URL=http://actual-budget:5006
      - ACTUAL_PASSWORD=${ACTUAL_PASSWORD}
      - ACTUAL_SYNC_ID=${ACTUAL_SYNC_ID}
      - ACTUAL_DATA_DIR=/app/actual-data
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_PROFILE=expense
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-300000}
      - DEFAULT_CATEGORY_GROUP=${DEFAULT_CATEGORY_GROUP:-Usual Expenses}
    volumes:
      - ~/.aws:/root/.aws:ro
    networks:
      - homelab

networks:
  homelab:
    external: true
